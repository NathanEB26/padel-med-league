# Configuration de déploiement Render (Blueprint).
# Sur Render : New > Blueprint > sélectionner ce dépôt > Apply.
services:
  - type: web
    name: padel-med-league
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python app.py"
    envVars:
      - key: HOST
        value: 0.0.0.0
