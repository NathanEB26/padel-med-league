<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">
  <title>Logo Ligue Padel Santé (serpent / caducée)</title>
  <rect width="1080" height="1080" fill="#070b10"/>

  <!-- Balle (cercle vert acide) -->
  <circle cx="540" cy="412" r="252" fill="#c6ff00"/>

  <!-- Raquette de padel (silhouette sombre) -->
  <ellipse cx="540" cy="360" rx="112" ry="140" fill="#070b10"/>
  <g fill="#c6ff00">
    <circle cx="540" cy="278" r="13"/>
    <circle cx="500" cy="320" r="13"/><circle cx="540" cy="320" r="13"/><circle cx="580" cy="320" r="13"/>
    <circle cx="486" cy="362" r="13"/><circle cx="523" cy="362" r="13"/><circle cx="557" cy="362" r="13"/><circle cx="594" cy="362" r="13"/>
    <circle cx="500" cy="404" r="13"/><circle cx="540" cy="404" r="13"/><circle cx="580" cy="404" r="13"/>
    <circle cx="540" cy="446" r="13"/>
  </g>

  <!-- Manche = bâton du caducée -->
  <rect x="514" y="486" width="52" height="196" rx="24" fill="#070b10"/>

  <!-- Serpent (monochrome lime) enroulé autour du manche -->
  <path d="M540 516 C522 528 522 547 540 559 C558 571 558 590 540 602 C522 614 522 633 540 645 C558 657 558 672 540 680"
        fill="none" stroke="#c6ff00" stroke-width="18" stroke-linecap="round"/>
  <ellipse cx="540" cy="504" rx="15" ry="12" fill="#c6ff00"/>
  <path d="M540 492 L534 480 M540 492 L546 480" stroke="#c6ff00" stroke-width="5" stroke-linecap="round" fill="none"/>
  <circle cx="546" cy="501" r="3" fill="#070b10"/>

  <!-- Wordmark -->
  <text x="540" y="812" text-anchor="middle" font-size="92" font-weight="900" font-style="italic"
        fill="#ffffff" letter-spacing="-1">PADEL SANTÉ</text>
  <text x="540" y="864" text-anchor="middle" font-size="30" font-weight="800"
        fill="#c6ff00" letter-spacing="11">ÎLE-DE-FRANCE</text>
</svg>
