<svg viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <title>Logo icône Ligue Padel Santé (serpent / caducée)</title>
  <rect width="1080" height="1080" fill="#070b10"/>

  <!-- Balle (remplit le cadre, idéal en rond) -->
  <circle cx="540" cy="540" r="408" fill="#c6ff00"/>

  <!-- Raquette de padel -->
  <ellipse cx="540" cy="455" rx="182" ry="226" fill="#070b10"/>
  <g fill="#c6ff00">
    <circle cx="540" cy="318" r="21"/>
    <circle cx="475" cy="391" r="21"/><circle cx="540" cy="391" r="21"/><circle cx="605" cy="391" r="21"/>
    <circle cx="453" cy="464" r="21"/><circle cx="511" cy="464" r="21"/><circle cx="569" cy="464" r="21"/><circle cx="627" cy="464" r="21"/>
    <circle cx="475" cy="537" r="21"/><circle cx="540" cy="537" r="21"/><circle cx="605" cy="537" r="21"/>
    <circle cx="540" cy="608" r="21"/>
  </g>

  <!-- Manche = bâton du caducée -->
  <rect x="503" y="650" width="74" height="262" rx="34" fill="#070b10"/>

  <!-- Serpent (monochrome lime) enroulé autour du manche -->
  <path d="M540 690 C514 706 514 730 540 746 C566 762 566 786 540 802 C514 818 514 842 540 858 C566 874 566 896 540 906"
        fill="none" stroke="#c6ff00" stroke-width="27" stroke-linecap="round"/>
  <!-- Tête + langue + œil -->
  <ellipse cx="540" cy="672" rx="22" ry="18" fill="#c6ff00"/>
  <path d="M540 656 L532 640 M540 656 L548 640" stroke="#c6ff00" stroke-width="7" stroke-linecap="round" fill="none"/>
  <circle cx="548" cy="668" r="4.5" fill="#070b10"/>
</svg>
